<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeNet Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 14px 20px;
      margin-bottom: 16px;
      background: #111;
    }
    .header-title { font-size: 1.2rem; color: #00ff41; letter-spacing: 2px; }
    .header-stats { display: flex; gap: 24px; font-size: 0.85rem; color: #aaa; }
    .bw-up { color: #00ff41; }
    .bw-down { color: #4af; }
    .live-dot {
      display: inline-block; width: 8px; height: 8px;
      background: #00ff41; border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Topology map ── */
    .topology {
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      background: #111;
      padding: 16px 20px;
      margin-bottom: 16px;
      overflow-x: auto;
    }
    .topology svg { display: block; margin: 0 auto; }
    .topo-label { font-size: 11px; fill: #aaa; font-family: monospace; }
    .topo-line { stroke: #333; stroke-width: 1.5; }
    .topo-node { stroke-width: 2; }
    .topo-node.online  { fill: #00ff41; stroke: #00ff41; filter: drop-shadow(0 0 4px #00ff41); }
    .topo-node.offline { fill: #ff4444; stroke: #ff4444; }
    .topo-node.stale   { fill: #ffaa00; stroke: #ffaa00; }
    .topo-node.unknown { fill: #444; stroke: #666; }
    .topo-wifi-line { stroke: #2a2a2a; stroke-width: 1; stroke-dasharray: 5 3; }
    .topo-wifi-section { font-size: 9px; fill: #444; font-family: monospace; letter-spacing: 1.5px; }

    /* ── Device count bar ── */
    .device-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: #aaa;
      letter-spacing: 1px;
    }
    .device-bar span.online-count { color: #00ff41; font-weight: bold; }
    .device-bar span.offline-count { color: #ff4444; }

    /* ── Device cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 14px 16px;
      background: #111;
      transition: box-shadow 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    .card:hover { border-color: #333; }
    .card.online  {
      border-color: #00ff4122;
      box-shadow: 0 0 12px #00ff4115;
    }
    .card.offline { border-color: #ff444422; opacity: 0.7; }
    .card.stale   { border-color: #ffaa0022; }

    .card.flash-on  { animation: flash-green 0.6s ease; }
    .card.flash-off { animation: flash-red 0.6s ease; }
    @keyframes flash-green {
      0% { background: #00ff4133; }
      100% { background: #111; }
    }
    @keyframes flash-red {
      0% { background: #ff444433; }
      100% { background: #111; }
    }

    .card-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.online  { background: #00ff41; box-shadow: 0 0 6px #00ff41; }
    .status-dot.offline { background: #ff4444; }
    .status-dot.stale   { background: #ffaa00; }
    .status-label { font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; }
    .status-label.online  { color: #00ff41; }
    .status-label.offline { color: #ff4444; }
    .status-label.stale   { color: #ffaa00; }

    .card-name { font-size: 0.95rem; color: #fff; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-detail { font-size: 0.75rem; color: #666; margin-bottom: 3px; }
    .card-detail span { color: #aaa; }

    .last-scan { text-align: right; margin-top: 16px; font-size: 0.7rem; color: #444; letter-spacing: 1px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-title">&#127760; HomeNet Dashboard</div>
    <div class="header-stats">
      <span>&#8593; <span class="bw-up" id="bw-up">--</span></span>
      <span>&#8595; <span class="bw-down" id="bw-down">--</span></span>
      <span><span class="live-dot"></span>LIVE</span>
    </div>
  </div>

  <!-- Topology map -->
  <div class="topology">
    <svg id="topo-svg" width="100%" height="255" viewBox="0 0 900 255" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <!-- Device count -->
  <div class="device-bar">
    <span>DEVICES</span>
    <span>
      <span class="online-count" id="count-online">0</span> online &nbsp;&middot;&nbsp;
      <span class="offline-count" id="count-offline">0</span> offline
    </span>
  </div>

  <!-- Cards -->
  <div class="cards" id="cards"></div>

  <div class="last-scan">Last scan: <span id="last-scan">--</span></div>

<script>
  // Network layout:
  // ONT → Router → Hall TV (patch cable, main hall)
  //             → Switch (TL-SG105E .243, work bedroom) → Work AP / Angshu Laptop / Wife Laptop / Server
  //             → Splitter (EH210, sleep bedroom)       → Sleep AP / Sleep TV
  // type:"infra" = always-on passive infrastructure with no scannable IP
  const TOPO_NODES = [
    { id: "ont",      label: "ONT",          x: 45,  y: 127, type: "infra"  },
    { id: "0.1",      label: "Router",       x: 150, y: 127, type: "device" },
    { id: "hall-tv",  label: "Hall TV",      x: 290, y: 45,  type: "device" },
    { id: "0.243",    label: "Switch",       x: 290, y: 130, type: "device" },
    { id: "splitter", label: "Splitter",     x: 290, y: 210, type: "infra"  },
    { id: "0.2",      label: "Work AP",      x: 450, y: 85,  type: "device" },
    { id: "0.100",    label: "Angshu",       x: 450, y: 115, type: "device", aliases: ["0.124", "0.129"] },
    { id: "0.148",    label: "Wife Laptop",  x: 450, y: 145, type: "device" },
    { id: "0.10",     label: "Server",       x: 450, y: 175, type: "device" },
    { id: "0.3",      label: "Sleep AP",     x: 450, y: 197, type: "device" },
    { id: "sleep-tv", label: "Sleep TV",     x: 450, y: 225, type: "device" },
  ];
  const TOPO_EDGES = [
    ["ont","0.1"],
    ["0.1","hall-tv"],
    ["0.1","0.243"],
    ["0.1","splitter"],
    ["0.243","0.2"],
    ["0.243","0.100"],
    ["0.243","0.148"],
    ["0.243","0.10"],
    ["splitter","0.3"],
    ["splitter","sleep-tv"],
  ];

  let prevStatuses = {};

  function fmtBytes(bps) {
    if (bps >= 1048576) return (bps / 1048576).toFixed(1) + " MB/s";
    if (bps >= 1024)    return (bps / 1024).toFixed(0) + " KB/s";
    return bps + " B/s";
  }

  function timeSince(isoStr) {
    if (!isoStr || isoStr === "never") return "never";
    const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (diff < 10) return "just now";
    if (diff < 60) return diff + "s ago";
    return Math.floor(diff / 60) + "m ago";
  }

  function mkEl(tag) { return document.createElementNS("http://www.w3.org/2000/svg", tag); }

  function buildTopo(devices) {
    const svg = document.getElementById("topo-svg");
    const statusMap = {};
    devices.forEach(d => {
      const suffix = d.ip.split(".").slice(2).join(".");
      statusMap[suffix] = d.status;
    });

    svg.innerHTML = "";

    // --- Static wired topology ---

    // Edges first (drawn behind nodes)
    TOPO_EDGES.forEach(([a, b]) => {
      const na = TOPO_NODES.find(n => n.id === a);
      const nb = TOPO_NODES.find(n => n.id === b);
      if (!na || !nb) return;
      const line = mkEl("line");
      line.setAttribute("x1", na.x); line.setAttribute("y1", na.y);
      line.setAttribute("x2", nb.x); line.setAttribute("y2", nb.y);
      line.setAttribute("class", "topo-line");
      svg.appendChild(line);
    });

    // --- Dynamic wireless clients ---
    // Build set of all IP suffixes already represented in static topology
    const staticSuffixes = new Set();
    TOPO_NODES.forEach(n => {
      if (n.id.startsWith("0.")) staticSuffixes.add(n.id);
      (n.aliases || []).forEach(a => staticSuffixes.add(a));
    });
    const wireless = devices.filter(d => {
      const suffix = d.ip.split(".").slice(2).join(".");
      return !staticSuffixes.has(suffix);
    });

    const HUB_X = 580, HUB_Y = 127;
    const CLIENT_X = 710;
    const MAX = 8;
    const shown = wireless.slice(0, MAX);
    const SPACING = 26;
    const startY = HUB_Y - Math.floor(((shown.length - 1) * SPACING) / 2);

    if (shown.length > 0) {
      // Dashed backbone: Router → WiFi hub (drawn first, behind static nodes)
      const router = TOPO_NODES.find(n => n.id === "0.1");
      const backbone = mkEl("line");
      backbone.setAttribute("x1", router.x); backbone.setAttribute("y1", router.y);
      backbone.setAttribute("x2", HUB_X);    backbone.setAttribute("y2", HUB_Y);
      backbone.setAttribute("class", "topo-wifi-line");
      svg.appendChild(backbone);

      // Dashed lines: hub → each client
      shown.forEach((dev, i) => {
        const cy = startY + i * SPACING;
        const l = mkEl("line");
        l.setAttribute("x1", HUB_X); l.setAttribute("y1", HUB_Y);
        l.setAttribute("x2", CLIENT_X); l.setAttribute("y2", cy);
        l.setAttribute("class", "topo-wifi-line");
        svg.appendChild(l);
      });
    }

    // Static nodes (drawn on top of all lines)
    TOPO_NODES.forEach(node => {
      const status = node.type === "infra" ? "online"
        : node.id === "0.100"
          ? (statusMap["0.100"] || statusMap["0.124"] || statusMap["0.129"] || "unknown")
          : (statusMap[node.id] || "unknown");

      const circle = mkEl("circle");
      circle.setAttribute("cx", node.x); circle.setAttribute("cy", node.y);
      circle.setAttribute("r", 7);
      circle.setAttribute("class", `topo-node ${status}`);
      svg.appendChild(circle);

      const text = mkEl("text");
      text.setAttribute("x", node.x); text.setAttribute("y", node.y + 20);
      text.setAttribute("text-anchor", "middle");
      text.setAttribute("class", "topo-label");
      text.textContent = node.label;
      svg.appendChild(text);
    });

    // WiFi hub + client nodes (drawn last — on top)
    if (shown.length > 0) {
      // Section label
      const sLabel = mkEl("text");
      sLabel.setAttribute("x", CLIENT_X + 10); sLabel.setAttribute("y", startY - 12);
      sLabel.setAttribute("text-anchor", "start");
      sLabel.setAttribute("class", "topo-wifi-section");
      sLabel.textContent = "WIRELESS";
      svg.appendChild(sLabel);

      // Hub circle + label
      const hubCircle = mkEl("circle");
      hubCircle.setAttribute("cx", HUB_X); hubCircle.setAttribute("cy", HUB_Y);
      hubCircle.setAttribute("r", 6);
      hubCircle.setAttribute("class", "topo-node online");
      svg.appendChild(hubCircle);

      const hubText = mkEl("text");
      hubText.setAttribute("x", HUB_X); hubText.setAttribute("y", HUB_Y + 18);
      hubText.setAttribute("text-anchor", "middle");
      hubText.setAttribute("class", "topo-label");
      hubText.textContent = "WiFi";
      svg.appendChild(hubText);

      // Client nodes + labels
      shown.forEach((dev, i) => {
        const cy = startY + i * SPACING;
        const suffix = dev.ip.split(".").slice(2).join(".");
        const lastOctet = suffix.split(".").pop();
        const label = dev.name !== "Unknown Device" ? dev.name : `.${lastOctet}`;

        const c = mkEl("circle");
        c.setAttribute("cx", CLIENT_X); c.setAttribute("cy", cy);
        c.setAttribute("r", 5);
        c.setAttribute("class", `topo-node ${dev.status}`);
        svg.appendChild(c);

        const t = mkEl("text");
        t.setAttribute("x", CLIENT_X + 10); t.setAttribute("y", cy + 4);
        t.setAttribute("text-anchor", "start");
        t.setAttribute("class", "topo-label");
        t.textContent = label;
        svg.appendChild(t);
      });

      if (wireless.length > MAX) {
        const more = mkEl("text");
        more.setAttribute("x", CLIENT_X + 10);
        more.setAttribute("y", startY + shown.length * SPACING + 4);
        more.setAttribute("text-anchor", "start");
        more.setAttribute("class", "topo-label");
        more.textContent = `+${wireless.length - MAX} more`;
        svg.appendChild(more);
      }
    }
  }

  function updateDashboard(data) {
    document.getElementById("bw-up").textContent = fmtBytes(data.bandwidth.upload_bps);
    document.getElementById("bw-down").textContent = fmtBytes(data.bandwidth.download_bps);
    document.getElementById("last-scan").textContent = new Date(data.scanned_at).toLocaleTimeString();

    const online = data.devices.filter(d => d.status === "online").length;
    const offline = data.devices.filter(d => d.status !== "online").length;
    document.getElementById("count-online").textContent = online;
    document.getElementById("count-offline").textContent = offline;

    buildTopo(data.devices);

    const container = document.getElementById("cards");
    const existingCards = {};
    container.querySelectorAll(".card[data-ip]").forEach(el => {
      existingCards[el.dataset.ip] = el;
    });

    data.devices.forEach(device => {
      const prev = prevStatuses[device.ip];
      const card = existingCards[device.ip] || document.createElement("div");

      if (!card.dataset.ip) {
        card.dataset.ip = device.ip;
        container.appendChild(card);
      }

      if (prev && prev !== device.status) {
        card.classList.remove("flash-on", "flash-off");
        void card.offsetWidth;
        if (device.status === "online") card.classList.add("flash-on");
        else card.classList.add("flash-off");
      }

      card.className = `card ${device.status}`;
      card.innerHTML = `
        <div class="card-status">
          <div class="status-dot ${device.status}"></div>
          <span class="status-label ${device.status}">${device.status}</span>
        </div>
        <div class="card-name">${device.name}</div>
        <div class="card-detail">IP: <span>${device.ip}</span></div>
        <div class="card-detail">MAC: <span>${device.mac}</span></div>
        <div class="card-detail">Vendor: <span>${device.vendor}</span></div>
        <div class="card-detail">Last seen: <span>${timeSince(device.last_seen)}</span></div>
      `;

      prevStatuses[device.ip] = device.status;
    });
  }

  function poll() {
    fetch("/api/scan")
      .then(r => r.json())
      .then(data => updateDashboard(data))
      .catch(err => console.error("Scan failed:", err));
  }

  poll();
  setInterval(poll, 5000);
</script>
</body>
</html>
