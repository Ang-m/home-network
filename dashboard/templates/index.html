<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeNet Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 14px 20px;
      margin-bottom: 16px;
      background: #111;
    }
    .header-title { font-size: 1.2rem; color: #00ff41; letter-spacing: 2px; }
    .header-stats { display: flex; gap: 24px; font-size: 0.85rem; color: #aaa; }
    .bw-up { color: #00ff41; }
    .bw-down { color: #4af; }
    .live-dot {
      display: inline-block; width: 8px; height: 8px;
      background: #00ff41; border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Topology map ── */
    .topology {
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      background: #0a0a0a;
      padding: 16px 20px;
      margin-bottom: 16px;
      overflow-x: auto;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,255,65,0.012) 2px,
        rgba(0,255,65,0.012) 4px
      );
    }
    .topology svg { display: block; margin: 0 auto; }
    .topo-label { font-size: 11px; fill: #aaa; font-family: monospace; }
    .topo-line { stroke: #333; stroke-width: 1.5; }
    .topo-node { stroke-width: 2; }
    .topo-node.online  { fill: #00ff41; stroke: #00ff41; filter: drop-shadow(0 0 4px #00ff41); }
    .topo-node.offline { fill: #ff4444; stroke: #ff4444; }
    .topo-node.stale   { fill: #ffaa00; stroke: #ffaa00; }
    .topo-node.unknown { fill: #444; stroke: #666; }
    .topo-wifi-line { stroke: #2a2a2a; stroke-width: 1; stroke-dasharray: 5 3; }
    .topo-wifi-section { font-size: 9px; fill: #444; font-family: monospace; letter-spacing: 1.5px; }

    /* ── Device count bar ── */
    .device-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: #aaa;
      letter-spacing: 1px;
    }
    .device-bar span.online-count { color: #00ff41; font-weight: bold; }
    .device-bar span.offline-count { color: #ff4444; }

    /* ── Device cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 14px 16px;
      background: #111;
      transition: box-shadow 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    .card:hover { border-color: #333; }
    .card.online  {
      border-color: #00ff4122;
      box-shadow: 0 0 12px #00ff4115;
    }
    .card.offline { border-color: #ff444422; opacity: 0.7; }
    .card.stale   { border-color: #ffaa0022; }

    .card.flash-on  { animation: flash-green 0.6s ease; }
    .card.flash-off { animation: flash-red 0.6s ease; }
    @keyframes flash-green {
      0% { background: #00ff4133; }
      100% { background: #111; }
    }
    @keyframes flash-red {
      0% { background: #ff444433; }
      100% { background: #111; }
    }

    .card-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.online  { background: #00ff41; box-shadow: 0 0 6px #00ff41; }
    .status-dot.offline { background: #ff4444; }
    .status-dot.stale   { background: #ffaa00; }
    .status-label { font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; }
    .status-label.online  { color: #00ff41; }
    .status-label.offline { color: #ff4444; }
    .status-label.stale   { color: #ffaa00; }

    .card-name { font-size: 0.95rem; color: #fff; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-detail { font-size: 0.75rem; color: #666; margin-bottom: 3px; }
    .card-detail span { color: #aaa; }

    .last-scan { text-align: right; margin-top: 16px; font-size: 0.7rem; color: #444; letter-spacing: 1px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-title">&#127760; HomeNet Dashboard</div>
    <div class="header-stats">
      <span>&#8593; <span class="bw-up" id="bw-up">--</span></span>
      <span>&#8595; <span class="bw-down" id="bw-down">--</span></span>
      <span><span class="live-dot"></span>LIVE</span>
    </div>
  </div>

  <!-- Topology map -->
  <div class="topology">
    <svg id="topo-svg" width="100%" height="305" viewBox="0 0 960 305" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="glow-green" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-cyan" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,65,0.035)" stroke-width="0.5"/>
        </pattern>
      </defs>
      <rect width="960" height="305" fill="url(#grid)"/>
      <g id="topo-content"></g>
    </svg>
  </div>

  <!-- Device count -->
  <div class="device-bar">
    <span>DEVICES</span>
    <span>
      <span class="online-count" id="count-online">0</span> online &nbsp;&middot;&nbsp;
      <span class="offline-count" id="count-offline">0</span> offline
    </span>
  </div>

  <!-- Cards -->
  <div class="cards" id="cards"></div>

  <div class="last-scan">Last scan: <span id="last-scan">--</span></div>

<script>
  // ONT → Router → Hall TV (patch, main hall)
  //             → Switch (TL-SG105E .243, work room) → Work AP / Angshu / Wife Laptop / Server
  //             → Splitter (EH210, sleep room)       → Sleep AP / Sleep TV
  // type:"infra" = always-on passive infrastructure (no scannable IP, rendered cyan)
  // busX in TOPO_EDGES = x-coord of the vertical bus segment (orthogonal routing)
  const TOPO_NODES = [
    { id:"ont",      label:"ONT",         x:60,  y:155, type:"infra",  icon:"ont"      },
    { id:"0.1",      label:"Router",      x:185, y:155, type:"device", icon:"router"   },
    { id:"0.154",    label:"Hall TV",     x:335, y:50,  type:"device", icon:"tv"       },
    { id:"0.243",    label:"Switch",      x:335, y:155, type:"device", icon:"switch"   },
    { id:"splitter", label:"Splitter",    x:335, y:262, type:"infra",  icon:"splitter" },
    { id:"0.2",      label:"Work AP",     x:505, y:95,  type:"device", icon:"ap"       },
    { id:"0.100",    label:"Angshu",      x:505, y:135, type:"device", icon:"laptop",  aliases:["0.124","0.129"] },
    { id:"0.148",    label:"Wife Laptop", x:505, y:175, type:"device", icon:"laptop"   },
    { id:"0.10",     label:"Server",      x:505, y:215, type:"device", icon:"server"   },
    { id:"0.3",      label:"Sleep AP",    x:505, y:248, type:"device", icon:"ap"       },
    { id:"sleep-tv", label:"Sleep TV",    x:505, y:278, type:"device", icon:"tv"       },
  ];
  const TOPO_EDGES = [
    ["ont",     "0.1",      null],
    ["0.1",     "0.154",    250],
    ["0.1",     "0.243",    250],
    ["0.1",     "splitter", 250],
    ["0.243",   "0.2",      415],
    ["0.243",   "0.100",    415],
    ["0.243",   "0.148",    415],
    ["0.243",   "0.10",     415],
    ["splitter","0.3",      415],
    ["splitter","sleep-tv", 415],
  ];

  let prevStatuses = {};

  function fmtBytes(bps) {
    if (bps >= 1048576) return (bps / 1048576).toFixed(1) + " MB/s";
    if (bps >= 1024)    return (bps / 1024).toFixed(0) + " KB/s";
    return bps + " B/s";
  }

  function timeSince(isoStr) {
    if (!isoStr || isoStr === "never") return "never";
    const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (diff < 10) return "just now";
    if (diff < 60) return diff + "s ago";
    return Math.floor(diff / 60) + "m ago";
  }

  // ── SVG helpers ──────────────────────────────────────────────────────────
  function mkSvg(tag) { return document.createElementNS("http://www.w3.org/2000/svg", tag); }
  function svgPath(d, style) {
    const p = mkSvg("path"); p.setAttribute("d", d); p.setAttribute("style", style); return p;
  }
  function svgLine(x1, y1, x2, y2, style) {
    const l = mkSvg("line");
    l.setAttribute("x1",x1); l.setAttribute("y1",y1);
    l.setAttribute("x2",x2); l.setAttribute("y2",y2);
    l.setAttribute("style", style); return l;
  }
  function svgRect(x, y, w, h, rx, style) {
    const r = mkSvg("rect");
    r.setAttribute("x",x); r.setAttribute("y",y);
    r.setAttribute("width",w); r.setAttribute("height",h);
    if (rx) r.setAttribute("rx",rx);
    r.setAttribute("style", style); return r;
  }
  function svgCircle(cx, cy, r, style) {
    const c = mkSvg("circle");
    c.setAttribute("cx",cx); c.setAttribute("cy",cy); c.setAttribute("r",r);
    c.setAttribute("style", style); return c;
  }
  function svgText(x, y, txt, anchor, style) {
    const t = mkSvg("text");
    t.setAttribute("x",x); t.setAttribute("y",y);
    t.setAttribute("text-anchor", anchor || "middle");
    t.setAttribute("style", style);
    t.textContent = txt; return t;
  }

  // ── Color palette per status ──────────────────────────────────────────────
  function statusPalette(status) {
    if (status === "infra")   return { s:"#33ccff", f:"#00111a" };
    if (status === "online")  return { s:"#00ff41", f:"#001a00" };
    if (status === "stale")   return { s:"#ffaa00", f:"#181000" };
    return { s:"#334455", f:"#0d0d0d" };
  }

  // ── Per-device icon shapes (centered at cx, cy) ───────────────────────────
  function drawIcon(parent, icon, cx, cy, col, flt) {
    const g = mkSvg("g");
    if (flt) g.setAttribute("filter", flt);
    const ss  = `stroke:${col.s};fill:${col.f};stroke-width:1.2;stroke-linecap:round;`;
    const sl  = `stroke:${col.s};fill:none;stroke-width:1.2;stroke-linecap:round;`;
    const sf  = `stroke:${col.s};fill:${col.s};stroke-width:1;`;

    switch (icon) {
      case "ont":
        g.appendChild(svgPath(`M${cx},${cy-9} L${cx+8},${cy} L${cx},${cy+9} L${cx-8},${cy} Z`, ss));
        break;
      case "router":
        g.appendChild(svgRect(cx-8, cy-4, 16, 8, 1, ss));
        g.appendChild(svgLine(cx-4, cy-4, cx-4, cy-10, `stroke:${col.s};stroke-width:1.2;`));
        g.appendChild(svgLine(cx+4, cy-4, cx+4, cy-10, `stroke:${col.s};stroke-width:1.2;`));
        g.appendChild(svgCircle(cx-4, cy-11, 1.5, sf));
        g.appendChild(svgCircle(cx+4, cy-11, 1.5, sf));
        break;
      case "switch":
        g.appendChild(svgRect(cx-10, cy-4, 20, 8, 1, ss));
        [-6,-2,2,6].forEach(dx => g.appendChild(svgCircle(cx+dx, cy, 1.5, sf)));
        break;
      case "ap":
        g.appendChild(svgCircle(cx, cy+5, 2, sf));
        g.appendChild(svgPath(`M${cx-5},${cy+3} A6,6 0 0,1 ${cx+5},${cy+3}`, sl));
        g.appendChild(svgPath(`M${cx-9},${cy-1} A10,10 0 0,1 ${cx+9},${cy-1}`, sl));
        break;
      case "laptop":
        g.appendChild(svgRect(cx-8, cy-6, 16, 10, 1, ss));
        g.appendChild(svgPath(`M${cx-10},${cy+5} L${cx+10},${cy+5} L${cx+7},${cy+8} L${cx-7},${cy+8} Z`, ss));
        break;
      case "server":
        g.appendChild(svgRect(cx-7, cy-9, 14, 18, 1, ss));
        [-4,0,4].forEach(dy => g.appendChild(svgLine(cx-4, cy+dy, cx+3, cy+dy, `stroke:${col.s};stroke-width:0.8;opacity:0.5;`)));
        g.appendChild(svgCircle(cx+3, cy-6, 1.5, sf));
        break;
      case "tv":
        g.appendChild(svgRect(cx-10, cy-7, 20, 13, 1, ss));
        g.appendChild(svgLine(cx, cy+6, cx, cy+9, `stroke:${col.s};stroke-width:1.2;`));
        g.appendChild(svgLine(cx-4, cy+9, cx+4, cy+9, `stroke:${col.s};stroke-width:1.2;`));
        break;
      case "splitter":
        g.appendChild(svgLine(cx, cy+9, cx, cy+1, `stroke:${col.s};stroke-width:1.5;`));
        g.appendChild(svgLine(cx, cy+1, cx-7, cy-7, `stroke:${col.s};stroke-width:1.5;`));
        g.appendChild(svgLine(cx, cy+1, cx+7, cy-7, `stroke:${col.s};stroke-width:1.5;`));
        g.appendChild(svgCircle(cx, cy+9, 2.5, `stroke:${col.s};fill:${col.f};stroke-width:1.2;`));
        break;
      case "phone":
        g.appendChild(svgRect(cx-4, cy-8, 8, 16, 2, ss));
        g.appendChild(svgCircle(cx, cy+5, 1.2, sf));
        break;
      case "wifi":
        g.appendChild(svgCircle(cx, cy, 9, `stroke:${col.s};fill:${col.f};stroke-width:1.2;`));
        g.appendChild(svgCircle(cx, cy+3, 2, sf));
        g.appendChild(svgPath(`M${cx-4},${cy+1} A5,5 0 0,1 ${cx+4},${cy+1}`, sl));
        g.appendChild(svgPath(`M${cx-7},${cy-2} A8,8 0 0,1 ${cx+7},${cy-2}`, sl));
        break;
      default:
        g.appendChild(svgCircle(cx, cy, 8, ss));
    }
    parent.appendChild(g);
  }

  // ── Main topology builder ─────────────────────────────────────────────────
  function buildTopo(devices) {
    const content = document.getElementById("topo-content");
    content.innerHTML = "";

    const statusMap = {};
    devices.forEach(d => {
      statusMap[d.ip.split(".").slice(2).join(".")] = d.status;
    });

    const staticSuffixes = new Set();
    TOPO_NODES.forEach(n => {
      if (n.id.startsWith("0.")) staticSuffixes.add(n.id);
      (n.aliases || []).forEach(a => staticSuffixes.add(a));
    });
    const wireless = devices.filter(d =>
      !staticSuffixes.has(d.ip.split(".").slice(2).join("."))
    );

    const WIRE = "stroke:#1a3a1a;fill:none;stroke-width:1.5;";
    const WIFI = "stroke:#0a3040;fill:none;stroke-width:1;stroke-dasharray:6,3;";

    const nodeMap = {};
    TOPO_NODES.forEach(n => nodeMap[n.id] = n);

    // WiFi backbone (drawn first, sits behind wired topology)
    if (wireless.length > 0) {
      const r = nodeMap["0.1"];
      content.appendChild(svgLine(r.x, r.y, 670, r.y, WIFI));
    }

    // Wired edges — orthogonal routing via busX
    TOPO_EDGES.forEach(([aId, bId, busX]) => {
      const na = nodeMap[aId], nb = nodeMap[bId];
      if (!na || !nb) return;
      const d = busX
        ? `M${na.x},${na.y} L${busX},${na.y} L${busX},${nb.y} L${nb.x},${nb.y}`
        : `M${na.x},${na.y} L${nb.x},${nb.y}`;
      content.appendChild(svgPath(d, WIRE));
    });

    // Static wired nodes + labels
    TOPO_NODES.forEach(node => {
      const rawStatus = node.type === "infra" ? "infra"
        : node.id === "0.100"
          ? (statusMap["0.100"] || statusMap["0.124"] || statusMap["0.129"] || "unknown")
          : (statusMap[node.id] || "unknown");
      const col = statusPalette(rawStatus);
      const flt = rawStatus === "online" ? "url(#glow-green)"
                : rawStatus === "infra"  ? "url(#glow-cyan)" : "";

      drawIcon(content, node.icon, node.x, node.y, col, flt);

      const isLeaf = node.x >= 450;
      if (isLeaf) {
        content.appendChild(svgText(node.x + 16, node.y + 4, node.label, "start",
          `font-size:10px;fill:${col.s};font-family:monospace;letter-spacing:0.5px;`));
      } else {
        content.appendChild(svgText(node.x, node.y + 22, node.label, "middle",
          `font-size:10px;fill:${col.s};font-family:monospace;letter-spacing:0.5px;`));
      }
    });

    // Wireless section
    if (wireless.length > 0) {
      const HUB_X = 670, HUB_Y = 155;
      const CLIENT_X = 810, BUS_X = 740;
      const SPACING = 32, MAX_W = 8;
      const shown = wireless.slice(0, MAX_W);
      const startY = HUB_Y - Math.floor(((shown.length - 1) * SPACING) / 2);

      const hubCol = statusPalette(shown.some(d => d.status === "online") ? "online" : "unknown");
      const hubFlt = hubCol.s === "#00ff41" ? "url(#glow-green)" : "";
      drawIcon(content, "wifi", HUB_X, HUB_Y, hubCol, hubFlt);
      content.appendChild(svgText(HUB_X, HUB_Y + 23, "WIFI", "middle",
        `font-size:9px;fill:${hubCol.s};font-family:monospace;letter-spacing:1.5px;`));

      content.appendChild(svgText(CLIENT_X - 2, startY - 16, "[ WIRELESS ]", "end",
        "font-size:9px;fill:#2a8888;font-family:monospace;letter-spacing:1.5px;"));

      content.appendChild(svgLine(HUB_X + 9, HUB_Y, BUS_X, HUB_Y, WIFI));
      if (shown.length > 1)
        content.appendChild(svgLine(BUS_X, startY, BUS_X, startY + (shown.length-1)*SPACING, WIFI));

      shown.forEach((dev, i) => {
        const cy = startY + i * SPACING;
        const col = statusPalette(dev.status);
        const flt = dev.status === "online" ? "url(#glow-green)" : "";
        content.appendChild(svgLine(BUS_X, cy, CLIENT_X, cy, WIFI));
        drawIcon(content, "phone", CLIENT_X, cy, col, flt);
        const rawLabel = dev.name !== "Unknown Device"
          ? dev.name.replace(/\s*\(.*?\)$/g, "")
          : `.${dev.ip.split(".").pop()}`;
        const label = rawLabel.length > 18 ? rawLabel.substring(0, 17) + "…" : rawLabel;
        content.appendChild(svgText(CLIENT_X + 14, cy + 4, label, "start",
          `font-size:9px;fill:${col.s};font-family:monospace;`));
      });

      if (wireless.length > MAX_W) {
        content.appendChild(svgText(CLIENT_X + 14,
          startY + shown.length * SPACING + 4,
          `+${wireless.length - MAX_W} more`, "start",
          "font-size:9px;fill:#445;font-family:monospace;"));
      }
    }
  }

  function updateDashboard(data) {
    document.getElementById("bw-up").textContent = fmtBytes(data.bandwidth.upload_bps);
    document.getElementById("bw-down").textContent = fmtBytes(data.bandwidth.download_bps);
    document.getElementById("last-scan").textContent = new Date(data.scanned_at).toLocaleTimeString();

    const online = data.devices.filter(d => d.status === "online").length;
    const offline = data.devices.filter(d => d.status !== "online").length;
    document.getElementById("count-online").textContent = online;
    document.getElementById("count-offline").textContent = offline;

    buildTopo(data.devices);

    const container = document.getElementById("cards");
    const existingCards = {};
    container.querySelectorAll(".card[data-ip]").forEach(el => {
      existingCards[el.dataset.ip] = el;
    });

    data.devices.forEach(device => {
      const prev = prevStatuses[device.ip];
      const card = existingCards[device.ip] || document.createElement("div");

      if (!card.dataset.ip) {
        card.dataset.ip = device.ip;
        container.appendChild(card);
      }

      if (prev && prev !== device.status) {
        card.classList.remove("flash-on", "flash-off");
        void card.offsetWidth;
        if (device.status === "online") card.classList.add("flash-on");
        else card.classList.add("flash-off");
      }

      card.className = `card ${device.status}`;
      card.innerHTML = `
        <div class="card-status">
          <div class="status-dot ${device.status}"></div>
          <span class="status-label ${device.status}">${device.status}</span>
        </div>
        <div class="card-name">${device.name}</div>
        <div class="card-detail">IP: <span>${device.ip}</span></div>
        <div class="card-detail">MAC: <span>${device.mac}</span></div>
        <div class="card-detail">Vendor: <span>${device.vendor}</span></div>
        <div class="card-detail">Last seen: <span>${timeSince(device.last_seen)}</span></div>
      `;

      prevStatuses[device.ip] = device.status;
    });
  }

  function poll() {
    fetch("/api/scan")
      .then(r => r.json())
      .then(data => updateDashboard(data))
      .catch(err => console.error("Scan failed:", err));
  }

  poll();
  setInterval(poll, 5000);
</script>
</body>
</html>
